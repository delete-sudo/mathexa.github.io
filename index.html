<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Airoglifph</title>

<script src="system/config.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

header{
display:flex;
justify-content:space-between;
padding:10px 15px;
background:#000;
}

button,input{
padding:8px;
margin:6px 0;
width:100%;
max-width:400px;
}

canvas{
border:1px solid #333;
width:100%;
max-width:900px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.panel{
background:#1a1a1a;
padding:20px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
}

</style>

</head>

<body>

<header>

<div>Airoglifph</div>

<div onclick="openSettings()" style="cursor:pointer">
⚙️
</div>

</header>

<main style="padding:15px">

<h3>Write Airoglifph</h3>

<input id="textInput">

<button onclick="previewText()">Preview</button>

<canvas id="previewCanvas" width="900" height="400"></canvas>

<button onclick="exportEAT()">Export .EAT</button>

</main>

<!-- SETTINGS -->

<div class="overlay" id="settings">

<div class="panel">

<h3>Developer</h3>

<div id="codeType"></div>

<input id="codeInput">

<button onclick="enterCode()">Enter</button>

<div id="devPanel" style="display:none">

<button onclick="openDesigner()">Open Designer</button>

<h4>Override</h4>

<input id="overrideInput">

<button onclick="enterOverride()">Activate</button>

</div>

<br>

<button onclick="closeSettings()">Close</button>

</div>

</div>

<!-- DESIGNER -->

<div class="overlay" id="designer">

<div class="panel">

<select id="charSelect"></select>

<canvas id="designerCanvas" width="500" height="500"></canvas>

<button onclick="clearGlyph()">Clear</button>
<button onclick="saveGlyph()">Save</button>
<button onclick="exportFont()">Export .AIROGLIFPH</button>
<button onclick="closeDesigner()">Close</button>

</div>

</div>

<script>

/* ================= ROTATING CODE ================= */

const CODE_KEYS=["A","B","C","D","E"];
let codeIndex=0;

function rotateCode(){

codeIndex=(codeIndex+1)%CODE_KEYS.length;

document.getElementById("codeType").innerText=
"Enter code "+CODE_KEYS[codeIndex];

}

rotateCode();

/* ================= GLOBAL ================= */

let fontData={};

let strokes=[];
let drawing=false;
let currentChar="";

/* ================= LOAD DEFAULT FONT ================= */

async function loadDefaultFont(){

try{

let r=await fetch(DEFAULT_FONT_PATH);

let text=await r.text();

let data=JSON.parse(atob(text));

fontData=data.font;

}catch(e){

console.log("No default font yet");

}

}

loadDefaultFont();

/* ================= SETTINGS ================= */

function openSettings(){

document.getElementById("settings").style.display="flex";

rotateCode();

}

function closeSettings(){

document.getElementById("settings").style.display="none";

}

function enterCode(){

let key=CODE_KEYS[codeIndex];

let val=btoa(document.getElementById("codeInput").value);

if(val===ENCODED_CODES[key]){

document.getElementById("devPanel").style.display="block";

rotateCode();

}else{

alert("Wrong code");

}

}

function enterOverride(){

let val=btoa(document.getElementById("overrideInput").value);

if(val===ENCODED_OVERRIDE){

alert("Override enabled");

}else{

alert("Wrong override");

}

}

/* ================= PREVIEW ================= */

function previewText(){

let canvas=document.getElementById("previewCanvas");

let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

let text=document.getElementById("textInput").value;

let x=10;
let y=40;

for(let c of text){

if(c===" "){
x+=20;
continue;
}

let g=fontData[c];

if(g){

g.forEach(stroke=>{

ctx.beginPath();

ctx.moveTo(x+stroke[0][0]*0.2,y+stroke[0][1]*0.2);

for(let i=1;i<stroke.length;i++){

ctx.lineTo(x+stroke[i][0]*0.2,y+stroke[i][1]*0.2);

}

ctx.stroke();

});

x+=30;

}else{

ctx.fillText(c,x,y);

x+=ctx.measureText(c).width+3;

}

}

}

/* ================= EXPORT TEXT ================= */

function exportEAT(){

let text=document.getElementById("textInput").value;

let payload={

sig:SYSTEM_SIGNATURE,

text:text

};

let blob=new Blob([btoa(JSON.stringify(payload))]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="message.EAT";

a.click();

}

/* ================= DESIGNER ================= */

function openDesigner(){

document.getElementById("designer").style.display="flex";

initDesigner();

}

function closeDesigner(){

document.getElementById("designer").style.display="none";

}

function initDesigner(){

let chars=

"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽąčęėįšųūž"+
"абвгдеёжзийклмнопрстуфхцчшщьыъэюя"+
"0123456789!?.,:;";

let select=document.getElementById("charSelect");

select.innerHTML="";

for(let c of chars){

let o=document.createElement("option");

o.value=c;

o.textContent=c;

select.appendChild(o);

}

currentChar=chars[0];

select.onchange=e=>{

saveGlyph();

currentChar=e.target.value;

loadGlyph();

};

loadGlyph();

}

/* ================= DRAW ================= */

const canvas=document.getElementById("designerCanvas");

const ctx=canvas.getContext("2d");

canvas.addEventListener("mousedown",e=>{

drawing=true;

let rect=canvas.getBoundingClientRect();

strokes.push([[e.clientX-rect.left,e.clientY-rect.top]]);

});

canvas.addEventListener("mousemove",e=>{

if(!drawing) return;

let rect=canvas.getBoundingClientRect();

strokes[strokes.length-1].push(

[e.clientX-rect.left,e.clientY-rect.top]

);

drawDesigner();

});

canvas.addEventListener("mouseup",()=>{

drawing=false;

});

/* ================= DRAW DESIGNER ================= */

function drawDesigner(){

ctx.clearRect(0,0,canvas.width,canvas.height);

strokes.forEach(s=>{

ctx.beginPath();

ctx.moveTo(s[0][0],s[0][1]);

for(let i=1;i<s.length;i++){

ctx.lineTo(s[i][0],s[i][1]);

}

ctx.stroke();

});

}

/* ================= SAVE ================= */

function saveGlyph(){

fontData[currentChar]=strokes;

localStorage.setItem("airoFont",JSON.stringify(fontData));

}

function loadGlyph(){

strokes=fontData[currentChar]||[];

drawDesigner();

}

function clearGlyph(){

strokes=[];

drawDesigner();

}

/* ================= EXPORT FONT ================= */

function exportFont(){

saveGlyph();

let payload={

sig:SYSTEM_SIGNATURE,

font:fontData

};

let blob=new Blob([btoa(JSON.stringify(payload))]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Airoglifph.AIROGLIFPH";

a.click();

}

</script>

</body>
</html>
