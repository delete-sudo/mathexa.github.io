<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
transition:.3s;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
font-size:20px;
background:#000;
}

main{
flex:1;
padding:15px;
max-width:900px;
margin:auto;
width:100%;
}

button,input,select{
padding:10px;
margin:6px 0;
width:100%;
max-width:400px;
}

canvas{
border:1px solid #444;
margin-top:10px;
width:100%;
height:auto;
touch-action:none;
}

.hidden{display:none}

/* THEMES */
.theme-light{background:#f5f5f5;color:#111}
.theme-blue{background:#0d1b2a;color:#e0e1dd}
.theme-green{background:#081c15;color:#d8f3dc}
.theme-purple{background:#240046;color:#f3e8ff}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>

<div id="startScreen">
<input type="file" id="fileInput">
<button onclick="openWriter()">Write</button>
<canvas id="readCanvas" width="900" height="200"></canvas>
</div>

<div id="writerScreen" class="hidden">
<input type="text" id="writerInput" placeholder="Type here">
<button onclick="generateText()">Preview</button>
<button onclick="exportEAT()">Export .EAT</button>
<canvas id="writeCanvas" width="900" height="200"></canvas>
<button onclick="goHome()">Back</button>
</div>

<div id="settingsPanel" class="hidden">
<h3>Settings</h3>
<select onchange="changeTheme(this.value)">
<option value="">Default</option>
<option value="theme-light">Light</option>
<option value="theme-blue">Blue</option>
<option value="theme-green">Green</option>
<option value="theme-purple">Purple</option>
</select>

<h4>Designer Access</h4>
<div id="codeLabel"></div>
<input type="text" id="codeInput">
<button onclick="checkCode()">Enter</button>

<h4>Override</h4>
<input type="text" id="overrideInput">
<button onclick="checkOverride()">Activate</button>

<h4>Advanced</h4>
<button onclick="useCustomFont()">Use Custom Font</button>

<button onclick="closeSettings()">Close</button>
</div>

<div id="designerScreen" class="hidden">
<select id="charSelect"></select>
<canvas id="designCanvas" width="500" height="300"></canvas>
<button onclick="clearCurrentLetter()">Clear</button>
<button onclick="saveCurrentGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="exitDesigner()">Back</button>
</div>

</main>

<script>

/* ========= SCALE SETTINGS ========= */

const LETTER_WIDTH = 70;      // smaller
const LETTER_SPACING = 10;    // tighter spacing
const GLYPH_SCALE = 0.6;      // reduce size

/* ========= ENCODING ========= */

function encodeData(obj){
const json=JSON.stringify(obj);
const base64=btoa(unescape(encodeURIComponent(json)));
return base64.match(/.{1,80}/g).join("\n");
}

function decodeData(text){
const clean=text.replace(/\n/g,"");
const json=decodeURIComponent(escape(atob(clean)));
return JSON.parse(json);
}

/* ========= GLOBAL ========= */

let coreFont={};
let currentFont={};
let customFont=null;
let override=false;
let lastData=[];
let designData={};
let strokes=[];
let currentChar="A";
let drawing=false;
let currentStroke=[];

document.getElementById("codeLabel").innerText="Enter Code Type: "+CURRENT_CODE_TYPE;

/* ========= LOAD CORE FONT ========= */

async function loadCoreFont(){
try{
const res=await fetch("fonts/AIROGLIFPH.AIROGLIFPH");
const text=await res.text();
const parsed=decodeData(text);
if(parsed.sig!==SYSTEM_SIGNATURE){alert("Font mismatch");return;}
coreFont=parsed.font;
currentFont=coreFont;
}catch(e){alert("Font load failed");}
}
loadCoreFont();

/* ========= RENDER FUNCTION ========= */

function drawGlyphs(ctx,data){
ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
ctx.strokeStyle="white";
ctx.lineWidth=2;
let offset=20;
data.forEach(letter=>{
letter.forEach(stroke=>{
if(stroke.length<2) return;
ctx.beginPath();
ctx.moveTo(offset+stroke[0][0]*GLYPH_SCALE,stroke[0][1]*GLYPH_SCALE);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(offset+stroke[i][0]*GLYPH_SCALE,stroke[i][1]*GLYPH_SCALE);
}
ctx.stroke();
});
offset+=LETTER_WIDTH+LETTER_SPACING;
});
}

/* ========= READER ========= */

fileInput.addEventListener("change",e=>{
const file=e.target.files[0];
if(!file) return;
const reader=new FileReader();
reader.onload=function(ev){
const parsed=decodeData(ev.target.result);
drawGlyphs(readCanvas.getContext("2d"),parsed.data);
};
reader.readAsText(file);
});

/* ========= WRITER ========= */

function openWriter(){startScreen.classList.add("hidden");writerScreen.classList.remove("hidden");}
function goHome(){writerScreen.classList.add("hidden");startScreen.classList.remove("hidden");}

function generateText(){
if(!currentFont||Object.keys(currentFont).length===0){alert("Font not ready");return;}
const text=writerInput.value;
lastData=[];
for(let ch of text){
let glyph=currentFont[ch]||currentFont[ch.toUpperCase()]||currentFont[ch.toLowerCase()];
if(glyph) lastData.push(glyph);
}
drawGlyphs(writeCanvas.getContext("2d"),lastData);
}

function exportEAT(){
if(!lastData.length){alert("Nothing to export");return;}
const payload={sig:SYSTEM_SIGNATURE,data:lastData};
const blob=new Blob([encodeData(payload)]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="TEXT.EAT";
a.click();
}

/* ========= SETTINGS ========= */

function openSettings(){settingsPanel.classList.remove("hidden");}
function closeSettings(){settingsPanel.classList.add("hidden");}
function changeTheme(t){document.body.className=t;}

function checkCode(){
if(btoa(codeInput.value)===ENCODED_CODES[CURRENT_CODE_TYPE]) openDesigner();
else alert("Wrong Code");
}

function checkOverride(){
if(btoa(overrideInput.value)===ENCODED_OVERRIDE){
override=true;alert("Override Active");
}else alert("Wrong Override");
}

function useCustomFont(){
if(!override){alert("Requires override");return;}
const input=document.createElement("input");
input.type="file";
input.onchange=e=>{
const reader=new FileReader();
reader.onload=function(ev){
const parsed=decodeData(ev.target.result);
if(parsed.sig!==SYSTEM_SIGNATURE){alert("Invalid font");return;}
customFont=parsed.font;
currentFont=customFont;
};
reader.readAsText(e.target.files[0]);
};
input.click();
}

/* ========= DESIGNER ========= */

function openDesigner(){
settingsPanel.classList.add("hidden");
designerScreen.classList.remove("hidden");
const select=document.getElementById("charSelect");
select.innerHTML="";
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzß";
for(let c of chars){
let o=document.createElement("option");
o.value=c;o.innerText=c;
select.appendChild(o);
}
select.onchange=e=>{
saveCurrentGlyph();
currentChar=e.target.value;
loadGlyph();
};
currentChar=select.value;
loadGlyph();
}

function exitDesigner(){designerScreen.classList.add("hidden");}

function loadGlyph(){
const saved=localStorage.getItem("airo_font");
if(saved) designData=JSON.parse(saved);
strokes=designData[currentChar]||[];
redrawDesigner();
}

function saveCurrentGlyph(){
designData[currentChar]=strokes;
localStorage.setItem("airo_font",JSON.stringify(designData));
}

function redrawDesigner(){
const ctx=designCanvas.getContext("2d");
ctx.clearRect(0,0,500,300);
ctx.strokeStyle="white";
ctx.lineWidth=2;
strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++) ctx.lineTo(stroke[i][0],stroke[i][1]);
ctx.stroke();
});
}

designCanvas.addEventListener("mousedown",e=>{
drawing=true;
currentStroke=[[e.offsetX,e.offsetY]];
});

designCanvas.addEventListener("mousemove",e=>{
if(!drawing) return;
currentStroke.push([e.offsetX,e.offsetY]);
redrawDesigner();
const ctx=designCanvas.getContext("2d");
ctx.beginPath();
ctx.moveTo(currentStroke[0][0],currentStroke[0][1]);
for(let i=1;i<currentStroke.length;i++) ctx.lineTo(currentStroke[i][0],currentStroke[i][1]);
ctx.stroke();
});

designCanvas.addEventListener("mouseup",()=>{
if(!drawing) return;
drawing=false;
if(currentStroke.length>1) strokes.push(currentStroke);
currentStroke=[];
saveCurrentGlyph();
redrawDesigner();
});

function clearCurrentLetter(){
strokes=[];
saveCurrentGlyph();
redrawDesigner();
}

function exportFont(){
saveCurrentGlyph();
const payload={sig:SYSTEM_SIGNATURE,font:designData};
const blob=new Blob([encodeData(payload)]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();
}

</script>
</body>
</html>
