<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:white;transition:.3s}
header{display:flex;justify-content:space-between;padding:15px;font-size:20px}
button,input,select{padding:8px;margin:6px}
canvas{border:1px solid #555;margin-top:10px}
.hidden{display:none}
.theme-light{background:#f5f5f5;color:#111}
.theme-blue{background:#0d1b2a;color:#e0e1dd}
.theme-green{background:#081c15;color:#d8f3dc}
.theme-purple{background:#240046;color:#f3e8ff}
.guideline{stroke:red;stroke-dasharray:5}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<div id="startScreen">
<h2>Hello</h2>
<input type="file" id="fileInput">
<button onclick="openWriter()">Write Airoglifph</button>
<canvas id="readCanvas" width="1200" height="250"></canvas>
</div>

<div id="writerScreen" class="hidden">
<h3>Write Airoglifph</h3>
<input type="text" id="writerInput">
<button onclick="generateText()">Preview</button>
<button onclick="exportEAT()">Export .EAT</button>
<canvas id="writeCanvas" width="1200" height="250"></canvas>
<button onclick="goHome()">Back</button>
</div>

<div id="settingsPanel" class="hidden">
<h3>Settings</h3>
<select onchange="changeTheme(this.value)">
<option value="">Default</option>
<option value="theme-light">Light</option>
<option value="theme-blue">Blue</option>
<option value="theme-green">Green</option>
<option value="theme-purple">Purple</option>
</select>

<h4>Designer Access</h4>
<div id="codeLabel"></div>
<input type="text" id="codeInput">
<button onclick="checkCode()">Enter</button>

<h4>Override</h4>
<input type="text" id="overrideInput">
<button onclick="checkOverride()">Override</button>

<h4>Advanced</h4>
<button onclick="useCustomFont()">Use Custom Font</button>

<button onclick="closeSettings()">Close</button>
</div>

<div id="designerScreen" class="hidden">
<h3>Font Designer</h3>
<select id="charSelect"></select>
<br>
<canvas id="designCanvas" width="500" height="300"></canvas>
<br>
<button onclick="saveGlyph()">Save Glyph</button>
<button onclick="exportFont()">Export .AIROGLIFPH</button>
<button onclick="exitDesigner()">Exit</button>
</div>

<script>

/* ===== UTIL ===== */

function hexEncode(str){
return str.split("").map(c=>c.charCodeAt(0).toString(16).padStart(2,"0")).join("");
}
function hexDecode(hex){
let out="";
for(let i=0;i<hex.length;i+=2){
out+=String.fromCharCode(parseInt(hex.substr(i,2),16));
}
return out;
}

/* ===== GLOBALS ===== */

let activeFont={};
let override=false;
let customFontMode=false;

/* ===== INIT ===== */

document.getElementById("codeLabel").innerText="Enter Code Type: "+CURRENT_CODE_TYPE;

fetch("fonts/AIROGLIFPH.AIROGLIFPH")
.then(r=>r.text())
.then(data=>{
const parsed=JSON.parse(hexDecode(data));
activeFont=parsed.font;
});

/* ===== EXTENSION CHECK ===== */

function validExtension(name){
if(override) return true;
return name.endsWith(".AFF") || name.endsWith(".AIROGLIFPH") || name.endsWith(".EAT");
}

/* ===== FILE READ ===== */

fileInput.addEventListener("change",e=>{
const file=e.target.files[0];
if(!validExtension(file.name)){alert("Invalid extension");return;}
const reader=new FileReader();
reader.onload=function(ev){
const parsed=JSON.parse(hexDecode(ev.target.result));
renderRead(parsed.data);
};
reader.readAsText(file);
});

function renderRead(data){
const ctx=readCanvas.getContext("2d");
ctx.clearRect(0,0,1200,250);
let offset=20;
data.forEach(letter=>{
letter.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(offset+stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++)ctx.lineTo(offset+stroke[i][0],stroke[i][1]);
ctx.stroke();
});
offset+=120;
});
}

/* ===== WRITER ===== */

function openWriter(){
startScreen.classList.add("hidden");
writerScreen.classList.remove("hidden");
}

function goHome(){
writerScreen.classList.add("hidden");
startScreen.classList.remove("hidden");
}

let lastData=[];

function generateText(){
const text=writerInput.value;
const ctx=writeCanvas.getContext("2d");
ctx.clearRect(0,0,1200,250);
let offset=20;
lastData=[];
for(let ch of text){
if(!activeFont[ch]){offset+=120;continue;}
const strokes=activeFont[ch];
lastData.push(strokes);
strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(offset+stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++)ctx.lineTo(offset+stroke[i][0],stroke[i][1]);
ctx.stroke();
});
offset+=120;
}
}

function exportEAT(){
const payload={sig:SYSTEM_SIGNATURE,data:lastData};
const blob=new Blob([hexEncode(JSON.stringify(payload))]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="TEXT.EAT";
a.click();
}

/* ===== SETTINGS ===== */

function openSettings(){settingsPanel.classList.remove("hidden");}
function closeSettings(){settingsPanel.classList.add("hidden");}

function changeTheme(t){document.body.className=t;}

function checkCode(){
const input=codeInput.value;
if(hexEncode(input)===ENCODED_CODES[CURRENT_CODE_TYPE]){
openDesigner();
}else alert("Wrong");
}

function checkOverride(){
if(hexEncode(overrideInput.value)===ENCODED_OVERRIDE){
override=true;
alert("Override Active");
}else alert("Wrong");
}

function useCustomFont(){
if(!override){alert("Requires override");return;}
const input=document.createElement("input");
input.type="file";
input.onchange=e=>{
const reader=new FileReader();
reader.onload=function(ev){
const parsed=JSON.parse(hexDecode(ev.target.result));
activeFont=parsed.font;
};
reader.readAsText(e.target.files[0]);
};
input.click();
}

/* ===== DESIGNER ===== */

let currentChar="A";
let designData={};

function openDesigner(){
settingsPanel.classList.add("hidden");
designerScreen.classList.remove("hidden");
initDesigner();
}

function exitDesigner(){
designerScreen.classList.add("hidden");
}

function initDesigner(){
const select=document.getElementById("charSelect");
select.innerHTML="";
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzß";
for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
select.appendChild(o);
}
select.onchange=e=>currentChar=e.target.value;
drawGuidelines();
}

function drawGuidelines(){
const ctx=designCanvas.getContext("2d");
ctx.clearRect(0,0,500,300);
ctx.strokeStyle="red";
ctx.setLineDash([5,5]);
ctx.beginPath();ctx.moveTo(0,50);ctx.lineTo(500,50);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,150);ctx.lineTo(500,150);ctx.stroke();
ctx.beginPath();ctx.moveTo(0,250);ctx.lineTo(500,250);ctx.stroke();
ctx.setLineDash([]);
}

let strokes=[];
let currentStroke=[];
designCanvas.addEventListener("mousedown",e=>{
currentStroke=[[e.offsetX,e.offsetY]];
});
designCanvas.addEventListener("mousemove",e=>{
if(currentStroke.length){
currentStroke.push([e.offsetX,e.offsetY]);
const ctx=designCanvas.getContext("2d");
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
}
});
designCanvas.addEventListener("mouseup",()=>{
if(currentStroke.length){
strokes.push(currentStroke);
currentStroke=[];
}
});

function saveGlyph(){
designData[currentChar]=strokes;
strokes=[];
drawGuidelines();
}

function exportFont(){
const payload={sig:SYSTEM_SIGNATURE,font:designData};
const blob=new Blob([hexEncode(JSON.stringify(payload))]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();
}

</script>
</body>
</html>
