<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#000;
font-size:18px;
}

main{
flex:1;
padding:15px;
max-width:900px;
margin:auto;
width:100%;
}

button,input,select{
padding:10px;
margin:6px 0;
width:100%;
max-width:420px;
}

canvas{
border:1px solid #333;
margin-top:10px;
width:100%;
height:auto;
touch-action:none;
}

.hidden{display:none}

.theme-light{background:#f5f5f5;color:#111}
.theme-blue{background:#0d1b2a;color:#e0e1dd}
.theme-green{background:#081c15;color:#d8f3dc}
.theme-purple{background:#240046;color:#f3e8ff}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>

<div id="startScreen">
<input type="file" id="fileInput">
<button onclick="openWriter()">Write</button>
<canvas id="readCanvas" width="900" height="300"></canvas>
</div>

<div id="writerScreen" class="hidden">
<input type="text" id="writerInput" placeholder="Type here">
<button onclick="generateText()">Preview</button>
<button onclick="exportEAT()">Export .EAT</button>
<canvas id="writeCanvas" width="900" height="300"></canvas>
<button onclick="goHome()">Back</button>
</div>

<div id="settingsPanel" class="hidden">
<h3>Settings</h3>
<select onchange="changeTheme(this.value)">
<option value="">Default</option>
<option value="theme-light">Light</option>
<option value="theme-blue">Blue</option>
<option value="theme-green">Green</option>
<option value="theme-purple">Purple</option>
</select>

<h4>Designer Access</h4>
<div id="codeLabel"></div>
<input type="text" id="codeInput">
<button onclick="checkCode()">Enter</button>

<h4>Override</h4>
<input type="text" id="overrideInput">
<button onclick="checkOverride()">Activate</button>

<h4>Advanced</h4>
<button onclick="useCustomFont()">Use Custom Font</button>

<button onclick="closeSettings()">Close</button>
</div>

<div id="designerScreen" class="hidden">
<select id="charSelect"></select>
<canvas id="designCanvas" width="500" height="300"></canvas>
<button onclick="clearCurrentLetter()">Clear</button>
<button onclick="saveCurrentGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="exitDesigner()">Back</button>
</div>

</main>

<script>

/* ================= FONT METRICS ================= */

const LETTER_WIDTH = 38;      // tight like real font
const LETTER_SPACING = 4;     // very small spacing
const WORD_SPACING = 18;      // distinguishable space
const LINE_HEIGHT = 85;
const SCALE = 0.45;

/* ================= ENCODING ================= */

function encodeData(obj){
const json=JSON.stringify(obj);
const base64=btoa(unescape(encodeURIComponent(json)));
return base64.match(/.{1,80}/g).join("\n");
}

function decodeData(text){
const clean=text.replace(/\n/g,"");
const json=decodeURIComponent(escape(atob(clean)));
return JSON.parse(json);
}

/* ================= GLOBAL ================= */

let coreFont={};
let currentFont={};
let customFont=null;
let override=false;
let lastData=[];

document.getElementById("codeLabel").innerText="Enter Code Type: "+CURRENT_CODE_TYPE;

/* ================= LOAD FONT ================= */

async function loadCoreFont(){
const res=await fetch("fonts/AIROGLIFPH.AIROGLIFPH");
const text=await res.text();
const parsed=decodeData(text);
coreFont=parsed.font;
currentFont=coreFont;
}
loadCoreFont();

/* ================= SMART DRAW ================= */

function drawSmart(ctx,text){
ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
ctx.strokeStyle="white";
ctx.lineWidth=2;

let x=20;
let y=60;
let maxWidth=ctx.canvas.width-20;

function drawGlyph(glyph){
glyph.forEach(stroke=>{
if(stroke.length<2) return;
ctx.beginPath();
ctx.moveTo(x+stroke[0][0]*SCALE,y+stroke[0][1]*SCALE);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(x+stroke[i][0]*SCALE,y+stroke[i][1]*SCALE);
}
ctx.stroke();
});
}

const words=text.split(" ");

for(let w=0; w<words.length; w++){

let word=words[w];
let wordWidth=word.length*(LETTER_WIDTH+LETTER_SPACING);

if(x+wordWidth>maxWidth){
if(wordWidth>maxWidth){
for(let i=0;i<word.length;i++){
if(x+LETTER_WIDTH>maxWidth){
x=20;
y+=LINE_HEIGHT;
}
let glyph=currentFont[word[i]];
if(glyph) drawGlyph(glyph);
x+=LETTER_WIDTH+LETTER_SPACING;
}
}else{
x=20;
y+=LINE_HEIGHT;
}
}

for(let i=0;i<word.length;i++){
let ch=word[i];
let glyph=currentFont[ch]||currentFont[ch.toUpperCase()]||currentFont[ch.toLowerCase()];
if(glyph){
drawGlyph(glyph);
x+=LETTER_WIDTH+LETTER_SPACING;
}
}

x+=WORD_SPACING;
}
}

/* ================= WRITER ================= */

function openWriter(){
startScreen.classList.add("hidden");
writerScreen.classList.remove("hidden");
}

function goHome(){
writerScreen.classList.add("hidden");
startScreen.classList.remove("hidden");
}

function generateText(){
if(!currentFont) return;
drawSmart(writeCanvas.getContext("2d"),writerInput.value);
}

/* ================= EXPORT ================= */

function exportEAT(){
const payload={sig:SYSTEM_SIGNATURE,data:writerInput.value};
const blob=new Blob([encodeData(payload)]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="TEXT.EAT";
a.click();
}

/* ================= READER ================= */

fileInput.addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(ev){
const parsed=decodeData(ev.target.result);
drawSmart(readCanvas.getContext("2d"),parsed.data);
};
reader.readAsText(file);
});

/* ================= SETTINGS ================= */

function openSettings(){settingsPanel.classList.remove("hidden");}
function closeSettings(){settingsPanel.classList.add("hidden");}
function changeTheme(t){document.body.className=t;}

function checkCode(){
if(btoa(codeInput.value)===ENCODED_CODES[CURRENT_CODE_TYPE])
openDesigner();
else alert("Wrong Code");
}

function checkOverride(){
if(btoa(overrideInput.value)===ENCODED_OVERRIDE){
override=true;
alert("Override Active");
}else alert("Wrong Override");
}

function useCustomFont(){
if(!override){alert("Requires override");return;}
const input=document.createElement("input");
input.type="file";
input.onchange=e=>{
const reader=new FileReader();
reader.onload=function(ev){
const parsed=decodeData(ev.target.result);
customFont=parsed.font;
currentFont=customFont;
};
reader.readAsText(e.target.files[0]);
};
input.click();
}

/* ================= DESIGNER ================= */

function openDesigner(){
settingsPanel.classList.add("hidden");
designerScreen.classList.remove("hidden");
const select=document.getElementById("charSelect");
select.innerHTML="";

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZ"+
"abcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽ"+
"ąčęėįšųūž";

for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
select.appendChild(o);
}
}

function exitDesigner(){
designerScreen.classList.add("hidden");
}

function clearCurrentLetter(){}
function saveCurrentGlyph(){}
function exportFont(){}

</script>
</body>
</html>
