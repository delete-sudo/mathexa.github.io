<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:#000;
}

main{
padding:15px;
height:calc(100vh - 50px);
overflow:auto;
}

button,input,select{
padding:8px;
margin:6px 0;
width:100%;
max-width:400px;
}

canvas{
border:1px solid #333;
margin-top:10px;
width:100%;
height:auto;
display:block;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.overlay-content{
background:#1a1a1a;
padding:20px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
border:1px solid #333;
}

.hidden{display:none}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>

<input type="text" id="writerInput" placeholder="Type here">
<button onclick="render()">Preview</button>
<canvas id="writeCanvas" width="900" height="500"></canvas>

</main>

<!-- SETTINGS OVERLAY -->
<div class="overlay" id="settingsOverlay">
<div class="overlay-content">

<h3>Themes</h3>
<select onchange="changeTheme(this.value)">
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="blue">Blue</option>
</select>

<h3>Advanced</h3>

<label>
<input type="checkbox" id="guideToggle" onchange="toggleGuides()">
 Show Guidelines
</label>

<h4>Enter Developer</h4>
<input type="text" id="devCode">
<button onclick="enterDeveloper()">Enter</button>

<div id="developerPanel" class="hidden">
<button onclick="openDesigner()">Open Designer</button>

<h4>More Advanced Features</h4>
<input type="text" id="overrideCode">
<button onclick="enterOverride()">System Override</button>
</div>

<br>
<button onclick="closeSettings()">Close</button>

</div>
</div>

<!-- DESIGNER -->
<div class="overlay" id="designerOverlay">
<div class="overlay-content">

<select id="charSelect"></select>
<canvas id="designCanvas" width="400" height="300"></canvas>

<button onclick="clearGlyph()">Clear</button>
<button onclick="saveGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="closeDesigner()">Close</button>

</div>
</div>

<script>

/* ================= METRICS ================= */

const LETTER_BOX_WIDTH = 26;
const LETTER_SPACING = 2;
const WORD_SPACING = 10;
const LINE_HEIGHT = 38;
const SCALE = 0.35;

/* ================= GLOBAL ================= */

let fontData = {};
let strokes = [];
let currentChar = "";
let drawing = false;
let showGuides = false;
let override = false;

/* ================= LOAD LOCAL FONT ================= */

function loadFont(){
let saved = localStorage.getItem("airo_font");
if(saved) fontData = JSON.parse(saved);
}
loadFont();

/* ================= TEXT ENGINE ================= */

function render(){
let ctx = writeCanvas.getContext("2d");
ctx.clearRect(0,0,writeCanvas.width,writeCanvas.height);
ctx.strokeStyle="white";
ctx.fillStyle="white";
ctx.lineWidth=1.5;
ctx.font="16px Arial";

let text = writerInput.value;
let x = 5;
let y = 20;
let maxWidth = writeCanvas.width - 5;

function newLine(){
x = 5;
y += LINE_HEIGHT;
}

function drawGlyph(glyph){

let centeredX = x + (LETTER_BOX_WIDTH/2);

glyph.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(centeredX + (stroke[0][0]-200)*SCALE,
           y + (stroke[0][1]-120)*SCALE);

for(let i=1;i<stroke.length;i++){
ctx.lineTo(centeredX + (stroke[i][0]-200)*SCALE,
           y + (stroke[i][1]-120)*SCALE);
}
ctx.stroke();
});
}

for(let i=0;i<text.length;i++){

let ch = text[i];

if(ch===" "){
x+=WORD_SPACING;
continue;
}

let glyph = fontData[ch];

if(glyph){

if(x+LETTER_BOX_WIDTH > maxWidth){
ctx.fillText("-",x,y);
newLine();
}

drawGlyph(glyph);
x+=LETTER_BOX_WIDTH+LETTER_SPACING;

}else{

let w = ctx.measureText(ch).width;

if(x+w>maxWidth){
newLine();
}

ctx.fillText(ch,x,y);
x+=w+LETTER_SPACING;
}
}
}

/* ================= SETTINGS ================= */

function openSettings(){
settingsOverlay.style.display="flex";
}

function closeSettings(){
settingsOverlay.style.display="none";
}

function changeTheme(val){
if(val==="light"){
document.body.style.background="#f5f5f5";
document.body.style.color="#111";
}
if(val==="blue"){
document.body.style.background="#0d1b2a";
document.body.style.color="#e0e1dd";
}
if(val==="dark"){
document.body.style.background="#111";
document.body.style.color="#fff";
}
}

function toggleGuides(){
showGuides=document.getElementById("guideToggle").checked;
}

/* ================= DEV ACCESS ================= */

function enterDeveloper(){
if(btoa(devCode.value)===ENCODED_CODES[CURRENT_CODE_TYPE]){
developerPanel.classList.remove("hidden");
}else alert("Wrong code");
}

function enterOverride(){
if(btoa(overrideCode.value)===ENCODED_OVERRIDE){
override=true;
alert("Override active");
}else alert("Wrong override");
}

/* ================= DESIGNER ================= */

function openDesigner(){
designerOverlay.style.display="flex";
initDesigner();
}

function closeDesigner(){
designerOverlay.style.display="none";
}

function initDesigner(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽąčęėįšųūž"+
"0123456789!?.,:;+-*/=()[]{}@#%^&<>";

let select = document.getElementById("charSelect");
select.innerHTML="";

for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
select.appendChild(o);
}

select.onchange = e=>{
saveGlyph();
currentChar = e.target.value;
loadGlyph();
};

currentChar = select.value;
loadGlyph();
}

function loadGlyph(){
strokes = fontData[currentChar] || [];
redrawDesigner();
}

function redrawDesigner(){

let ctx = designCanvas.getContext("2d");
ctx.clearRect(0,0,designCanvas.width,designCanvas.height);
ctx.strokeStyle="white";
ctx.lineWidth=2;

if(showGuides){
ctx.strokeStyle="red";
ctx.setLineDash([5,5]);
ctx.beginPath();
ctx.moveTo(0,150);
ctx.lineTo(400,150);
ctx.stroke();
ctx.setLineDash([]);
ctx.strokeStyle="white";
}

strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(stroke[i][0],stroke[i][1]);
}
ctx.stroke();
});
}

designCanvas.addEventListener("mousedown",e=>{
let rect=designCanvas.getBoundingClientRect();
drawing=true;
strokes.push([]);
strokes[strokes.length-1].push([
e.clientX-rect.left,
e.clientY-rect.top
]);
});

designCanvas.addEventListener("mousemove",e=>{
if(!drawing) return;
let rect=designCanvas.getBoundingClientRect();
strokes[strokes.length-1].push([
e.clientX-rect.left,
e.clientY-rect.top
]);
redrawDesigner();
});

designCanvas.addEventListener("mouseup",()=>{
drawing=false;
saveGlyph();
});

function clearGlyph(){
strokes=[];
saveGlyph();
redrawDesigner();
}

function saveGlyph(){
fontData[currentChar]=strokes;
localStorage.setItem("airo_font",JSON.stringify(fontData));
}

function exportFont(){
saveGlyph();
const payload={sig:SYSTEM_SIGNATURE,font:fontData};
const blob=new Blob([btoa(JSON.stringify(payload))]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();
}

</script>
</body>
</html>
