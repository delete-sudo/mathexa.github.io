<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:#000;
}

main{
padding:15px;
height:calc(100vh - 50px);
overflow:auto;
}

button,input,select{
padding:8px;
margin:6px 0;
width:100%;
max-width:400px;
}

canvas{
border:1px solid #333;
margin-top:10px;
width:100%;
height:auto;
display:block;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.overlay-content{
background:#1a1a1a;
padding:20px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
border:1px solid #333;
}

.hidden{display:none}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>
<input type="text" id="writerInput" placeholder="Type here">
<button onclick="render()">Preview</button>
<canvas id="writeCanvas" width="900" height="500"></canvas>
</main>

<!-- SETTINGS -->
<div class="overlay" id="settingsOverlay">
<div class="overlay-content">

<h3>Developer Access</h3>
<div id="codeDisplay"></div>
<input type="text" id="devCode">
<button onclick="enterDeveloper()">Enter</button>

<div id="developerPanel" class="hidden">
<button onclick="openDesigner()">Open Designer</button>

<h4>System Override</h4>
<input type="text" id="overrideCode">
<button onclick="enterOverride()">Activate</button>
</div>

<br>
<button onclick="closeSettings()">Close</button>
</div>
</div>

<!-- DESIGNER -->
<div class="overlay" id="designerOverlay">
<div class="overlay-content">

<select id="charSelect"></select>
<canvas id="designCanvas" width="400" height="300"></canvas>

<button onclick="clearGlyph()">Clear</button>
<button onclick="saveGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="closeDesigner()">Close</button>

</div>
</div>

<script>

/* ================= ROTATING CODE SYSTEM ================= */

let CODE_TYPES = ["A","B","C","D","E"];
let CURRENT_INDEX = 0;

function rotateCode(){
CURRENT_INDEX = (CURRENT_INDEX+1) % CODE_TYPES.length;
document.getElementById("codeDisplay").innerText =
"Enter Code Type: " + CODE_TYPES[CURRENT_INDEX];
}

rotateCode();

/* ================= FONT METRICS ================= */

const LETTER_BOX_WIDTH = 24;
const LETTER_SPACING = 2;
const WORD_SPACING = 10;
const LINE_HEIGHT = 36;
const SCALE = 0.35;

/* ================= GLOBAL ================= */

let fontData = {};
let strokes = [];
let currentChar = "";
let drawing = false;
let override = false;

/* ================= LOAD LOCAL FONT ================= */

function loadFont(){
let saved = localStorage.getItem("airo_font");
if(saved) fontData = JSON.parse(saved);
}
loadFont();

/* ================= CENTERING ENGINE ================= */

function centerGlyph(glyph){

let minX=Infinity,maxX=-Infinity;
let minY=Infinity,maxY=-Infinity;

glyph.forEach(stroke=>{
stroke.forEach(pt=>{
if(pt[0]<minX) minX=pt[0];
if(pt[0]>maxX) maxX=pt[0];
if(pt[1]<minY) minY=pt[1];
if(pt[1]>maxY) maxY=pt[1];
});
});

let width=maxX-minX;
let height=maxY-minY;

let offsetX = (LETTER_BOX_WIDTH/SCALE - width)/2 - minX;
let offsetY = (LINE_HEIGHT/SCALE - height)/2 - minY;

return glyph.map(stroke =>
stroke.map(pt => [
pt[0] + offsetX,
pt[1] + offsetY
])
);
}

/* ================= TEXT ENGINE ================= */

function render(){

let ctx = writeCanvas.getContext("2d");
ctx.clearRect(0,0,writeCanvas.width,writeCanvas.height);
ctx.strokeStyle="white";
ctx.fillStyle="white";
ctx.lineWidth=1.5;
ctx.font="16px Arial";

let text = writerInput.value;
let x = 5;
let y = 20;
let maxWidth = writeCanvas.width - 5;

function newLine(){
x=5;
y+=LINE_HEIGHT;
}

for(let i=0;i<text.length;i++){

let ch=text[i];

if(ch===" "){
x+=WORD_SPACING;
continue;
}

let glyph = fontData[ch];

if(glyph){

if(x+LETTER_BOX_WIDTH>maxWidth){
ctx.fillText("-",x,y);
newLine();
}

let centered = centerGlyph(glyph);

centered.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(x+stroke[0][0]*SCALE,
           y+stroke[0][1]*SCALE);
for(let j=1;j<stroke.length;j++){
ctx.lineTo(x+stroke[j][0]*SCALE,
           y+stroke[j][1]*SCALE);
}
ctx.stroke();
});

x+=LETTER_BOX_WIDTH+LETTER_SPACING;

}else{

let w = ctx.measureText(ch).width;
if(x+w>maxWidth) newLine();
ctx.fillText(ch,x,y);
x+=w+LETTER_SPACING;
}
}
}

/* ================= SETTINGS ================= */

function openSettings(){
settingsOverlay.style.display="flex";
rotateCode();
}

function closeSettings(){
settingsOverlay.style.display="none";
}

function enterDeveloper(){
let codeType = CODE_TYPES[CURRENT_INDEX];
if(btoa(devCode.value)===ENCODED_CODES[codeType]){
developerPanel.classList.remove("hidden");
rotateCode();
}else alert("Wrong code");
}

function enterOverride(){
if(btoa(overrideCode.value)===ENCODED_OVERRIDE){
override=true;
alert("Override active");
}else alert("Wrong override");
}

/* ================= DESIGNER ================= */

function openDesigner(){
designerOverlay.style.display="flex";
initDesigner();
}

function closeDesigner(){
designerOverlay.style.display="none";
}

function initDesigner(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽąčęėįšųūž"+
"0123456789!?.,:;+-*/=()[]{}@#%^&<>";

let select=document.getElementById("charSelect");
select.innerHTML="";

for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
select.appendChild(o);
}

select.onchange=e=>{
saveGlyph();
currentChar=e.target.value;
loadGlyph();
};

currentChar=select.value;
loadGlyph();
}

function loadGlyph(){
strokes = fontData[currentChar] || [];
redrawDesigner();
}

function redrawDesigner(){
let ctx=designCanvas.getContext("2d");
ctx.clearRect(0,0,designCanvas.width,designCanvas.height);
ctx.strokeStyle="white";
ctx.lineWidth=2;

strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(stroke[i][0],stroke[i][1]);
}
ctx.stroke();
});
}

designCanvas.addEventListener("mousedown",e=>{
let rect=designCanvas.getBoundingClientRect();
drawing=true;
strokes.push([[e.clientX-rect.left,e.clientY-rect.top]]);
});

designCanvas.addEventListener("mousemove",e=>{
if(!drawing) return;
let rect=designCanvas.getBoundingClientRect();
strokes[strokes.length-1].push([
e.clientX-rect.left,
e.clientY-rect.top
]);
redrawDesigner();
});

designCanvas.addEventListener("mouseup",()=>{
drawing=false;
saveGlyph();
});

function clearGlyph(){
strokes=[];
saveGlyph();
redrawDesigner();
}

function saveGlyph(){
fontData[currentChar]=strokes;
localStorage.setItem("airo_font",JSON.stringify(fontData));
}

function exportFont(){
saveGlyph();
const payload={sig:SYSTEM_SIGNATURE,font:fontData};
const blob=new Blob([btoa(JSON.stringify(payload))]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();
}

</script>
</body>
</html>
