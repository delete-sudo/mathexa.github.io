<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#000;
}

main{
flex:1;
padding:15px;
max-width:900px;
margin:auto;
width:100%;
}

button,input,select{
padding:10px;
margin:6px 0;
width:100%;
max-width:420px;
}

canvas{
border:1px solid #333;
margin-top:10px;
width:100%;
height:auto;
touch-action:none;
}

.hidden{display:none}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>

<div id="startScreen">
<input type="file" id="fileInput">
<button onclick="openWriter()">Write</button>
<canvas id="readCanvas" width="900" height="400"></canvas>
</div>

<div id="writerScreen" class="hidden">
<input type="text" id="writerInput" placeholder="Type here">
<button onclick="generateText()">Preview</button>
<button onclick="exportEAT()">Export .EAT</button>
<canvas id="writeCanvas" width="900" height="400"></canvas>
<button onclick="goHome()">Back</button>
</div>

<div id="settingsPanel" class="hidden">
<h3>Settings</h3>
<div id="codeLabel"></div>
<input type="text" id="codeInput">
<button onclick="checkCode()">Enter Designer</button>
<button onclick="closeSettings()">Close</button>
</div>

<div id="designerScreen" class="hidden">
<select id="charSelect"></select>
<canvas id="designCanvas" width="400" height="250"></canvas>
<button onclick="clearCurrentLetter()">Clear</button>
<button onclick="saveCurrentGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="exitDesigner()">Back</button>
</div>

</main>

<script>

/* ================= FONT METRICS ================= */

const LETTER_WIDTH = 24;
const LETTER_SPACING = 2;
const WORD_SPACING = 10;
const LINE_HEIGHT = 42;
const SCALE = 0.35;

/* ================= ENCODE / DECODE ================= */

function encodeData(obj){
const json=JSON.stringify(obj);
return btoa(unescape(encodeURIComponent(json)));
}

function decodeData(text){
return JSON.parse(decodeURIComponent(escape(atob(text))));
}

/* ================= GLOBAL ================= */

let coreFont={};
let currentFont={};
let designData={};
let strokes=[];
let currentChar="";
let drawing=false;
let currentStroke=[];

document.getElementById("codeLabel").innerText="Enter Code Type: "+CURRENT_CODE_TYPE;

/* ================= LOAD CORE FONT ================= */

async function loadCoreFont(){
const res=await fetch("fonts/AIROGLIFPH.AIROGLIFPH");
const text=await res.text();
const parsed=decodeData(text);
coreFont=parsed.font;
currentFont=coreFont;
}
loadCoreFont();

/* ================= TEXT ENGINE ================= */

function renderText(ctx,text){
ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
ctx.strokeStyle="white";
ctx.fillStyle="white";
ctx.lineWidth=1.5;
ctx.font="16px Arial";

let x=5;
let y=20;
let maxWidth=ctx.canvas.width-5;

function drawGlyph(glyph){
glyph.forEach(stroke=>{
if(stroke.length<2) return;
ctx.beginPath();
ctx.moveTo(x+stroke[0][0]*SCALE,y+stroke[0][1]*SCALE);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(x+stroke[i][0]*SCALE,y+stroke[i][1]*SCALE);
}
ctx.stroke();
});
}

function newLine(){
x=5;
y+=LINE_HEIGHT;
}

for(let i=0;i<text.length;i++){

let ch=text[i];

if(ch===" "){
x+=WORD_SPACING;
continue;
}

let glyph=currentFont[ch]||
currentFont[ch.toUpperCase()]||
currentFont[ch.toLowerCase()];

if(glyph){

if(x+LETTER_WIDTH>maxWidth){
let prev=text[i-1];
if(prev && prev!==" "){
ctx.fillText("-",x,y);
}
newLine();
}

drawGlyph(glyph);
x+=LETTER_WIDTH+LETTER_SPACING;

}else{

let width=ctx.measureText(ch).width;

if(x+width>maxWidth){
newLine();
}

ctx.fillText(ch,x,y);
x+=width+LETTER_SPACING;
}
}
}

/* ================= WRITER ================= */

function openWriter(){
startScreen.classList.add("hidden");
writerScreen.classList.remove("hidden");
}

function goHome(){
writerScreen.classList.add("hidden");
startScreen.classList.remove("hidden");
}

function generateText(){
renderText(writeCanvas.getContext("2d"),writerInput.value);
}

/* ================= READER ================= */

fileInput.addEventListener("change",e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(ev){
const parsed=decodeData(ev.target.result);
renderText(readCanvas.getContext("2d"),parsed.data);
};
reader.readAsText(file);
});

/* ================= EXPORT ================= */

function exportEAT(){
const payload={sig:SYSTEM_SIGNATURE,data:writerInput.value};
const blob=new Blob([encodeData(payload)]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="TEXT.EAT";
a.click();
}

/* ================= DESIGNER ================= */

function openSettings(){settingsPanel.classList.remove("hidden");}
function closeSettings(){settingsPanel.classList.add("hidden");}

function checkCode(){
if(btoa(codeInput.value)===ENCODED_CODES[CURRENT_CODE_TYPE])
openDesigner();
else alert("Wrong Code");
}

function openDesigner(){
settingsPanel.classList.add("hidden");
designerScreen.classList.remove("hidden");

let saved=localStorage.getItem("airo_font");
if(saved) designData=JSON.parse(saved);

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽąčęėįšųūž0123456789";

let select=document.getElementById("charSelect");
select.innerHTML="";
for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
select.appendChild(o);
}
select.onchange=e=>{
saveCurrentGlyph();
currentChar=e.target.value;
loadGlyph();
};
currentChar=select.value;
loadGlyph();
}

function loadGlyph(){
strokes=designData[currentChar]||[];
redrawDesigner();
}

function redrawDesigner(){
const ctx=designCanvas.getContext("2d");
ctx.clearRect(0,0,400,250);
ctx.strokeStyle="white";
ctx.lineWidth=2;
strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++) ctx.lineTo(stroke[i][0],stroke[i][1]);
ctx.stroke();
});
}

designCanvas.addEventListener("mousedown",e=>{
drawing=true;
currentStroke=[[e.offsetX,e.offsetY]];
});

designCanvas.addEventListener("mousemove",e=>{
if(!drawing) return;
currentStroke.push([e.offsetX,e.offsetY]);
redrawDesigner();
let ctx=designCanvas.getContext("2d");
ctx.beginPath();
ctx.moveTo(currentStroke[0][0],currentStroke[0][1]);
for(let i=1;i<currentStroke.length;i++) ctx.lineTo(currentStroke[i][0],currentStroke[i][1]);
ctx.stroke();
});

designCanvas.addEventListener("mouseup",()=>{
if(!drawing) return;
drawing=false;
if(currentStroke.length>1) strokes.push(currentStroke);
currentStroke=[];
saveCurrentGlyph();
redrawDesigner();
});

function clearCurrentLetter(){
strokes=[];
saveCurrentGlyph();
redrawDesigner();
}

function saveCurrentGlyph(){
designData[currentChar]=strokes;
localStorage.setItem("airo_font",JSON.stringify(designData));
}

function exportFont(){
saveCurrentGlyph();
const payload={sig:SYSTEM_SIGNATURE,font:designData};
const blob=new Blob([encodeData(payload)]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();
}

function exitDesigner(){
designerScreen.classList.add("hidden");
}

</script>
</body>
</html>
