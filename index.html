<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airoglifph</title>
<script src="system/config.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
overflow:hidden;
}

header{
display:flex;
justify-content:space-between;
padding:12px 16px;
background:#000;
}

main{
padding:15px;
height:calc(100vh - 50px);
overflow:auto;
}

button,input,select{
padding:8px;
margin:6px 0;
width:100%;
max-width:420px;
}

canvas{
border:1px solid #333;
width:100%;
height:auto;
display:block;
margin-top:10px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.overlay-content{
background:#1a1a1a;
padding:20px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
border:1px solid #333;
}
</style>
</head>
<body>

<header>
<div>Airoglifph</div>
<div onclick="openSettings()" style="cursor:pointer">⚙️</div>
</header>

<main>
<input id="writerInput" placeholder="Type here">
<button onclick="render()">Preview</button>
<canvas id="writeCanvas" width="900" height="500"></canvas>
</main>

<!-- SETTINGS -->
<div class="overlay" id="settingsOverlay">
<div class="overlay-content">

<h3>Developer Access</h3>
<div id="codeDisplay"></div>

<input id="devCode">
<button onclick="enterDeveloper()">Enter</button>

<div id="developerPanel" style="display:none">

<button onclick="openDesigner()">Open Designer</button>

<h4>Override</h4>
<input id="overrideCode">
<button onclick="enterOverride()">Activate</button>

</div>

<br>
<button onclick="closeSettings()">Close</button>

</div>
</div>

<!-- DESIGNER -->
<div class="overlay" id="designerOverlay">
<div class="overlay-content">

<select id="charSelect"></select>

<canvas id="designCanvas" width="420" height="420"></canvas>

<button onclick="clearGlyph()">Clear</button>
<button onclick="saveGlyph()">Save</button>
<button onclick="exportFont()">Export Font</button>
<button onclick="closeDesigner()">Close</button>

</div>
</div>

<script>

/* ================= GRID SYSTEM ================= */

const GRID_SIZE = 84; // squares per cm equivalent
const CELL = 5;       // pixel size of each grid square

const GRID_PIXELS = GRID_SIZE * CELL;

/* ================= ROTATING CODE ================= */

const CODE_TYPES=["A","B","C","D","E"];
let codeIndex=0;

function rotateCode(){
codeIndex=(codeIndex+1)%CODE_TYPES.length;
codeDisplay.innerText="Enter Code "+CODE_TYPES[codeIndex];
}

rotateCode();

/* ================= GLOBAL ================= */

let fontData={};
let strokes=[];
let drawing=false;
let currentChar="";
let override=false;

/* ================= LOAD FONT ================= */

let saved=localStorage.getItem("airo_font");
if(saved) fontData=JSON.parse(saved);

/* ================= GRID DRAW ================= */

function drawGrid(){

let ctx=designCanvas.getContext("2d");
ctx.clearRect(0,0,designCanvas.width,designCanvas.height);

ctx.strokeStyle="#333";
ctx.lineWidth=0.5;

for(let x=0;x<=designCanvas.width;x+=CELL){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,designCanvas.height);
ctx.stroke();
}

for(let y=0;y<=designCanvas.height;y+=CELL){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(designCanvas.width,y);
ctx.stroke();
}
}

/* ================= SNAP ================= */

function snap(value){
return Math.round(value/CELL)*CELL;
}

/* ================= DESIGNER ================= */

function openDesigner(){
designerOverlay.style.display="flex";
initDesigner();
}

function closeDesigner(){
designerOverlay.style.display="none";
}

function initDesigner(){

const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"+
"ĄČĘĖĮŠŲŪŽąčęėįšųūž"+
"0123456789"+
"!?,.:;+-*/=()[]{}@#%^&<>"+
"абвгдеёжзийклмнопрстуфхцчшщьыъэюя"+
"АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЬЫЪЭЮЯ";

charSelect.innerHTML="";

for(let c of chars){
let o=document.createElement("option");
o.value=c;
o.innerText=c;
charSelect.appendChild(o);
}

charSelect.onchange=e=>{
saveGlyph();
currentChar=e.target.value;
loadGlyph();
};

currentChar=charSelect.value;
loadGlyph();
}

/* ================= LOAD GLYPH ================= */

function loadGlyph(){
strokes=fontData[currentChar]||[];
drawGrid();
drawStrokes();
}

/* ================= DRAW STROKES ================= */

function drawStrokes(){

let ctx=designCanvas.getContext("2d");
ctx.strokeStyle="white";
ctx.lineWidth=2;

strokes.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(stroke[0][0],stroke[0][1]);
for(let i=1;i<stroke.length;i++){
ctx.lineTo(stroke[i][0],stroke[i][1]);
}
ctx.stroke();
});
}

/* ================= MOUSE DRAW ================= */

designCanvas.addEventListener("mousedown",e=>{

let rect=designCanvas.getBoundingClientRect();

let x=snap(e.clientX-rect.left);
let y=snap(e.clientY-rect.top);

drawing=true;
strokes.push([[x,y]]);
});

designCanvas.addEventListener("mousemove",e=>{

if(!drawing) return;

let rect=designCanvas.getBoundingClientRect();

let x=snap(e.clientX-rect.left);
let y=snap(e.clientY-rect.top);

strokes[strokes.length-1].push([x,y]);

drawGrid();
drawStrokes();

});

designCanvas.addEventListener("mouseup",()=>{
drawing=false;
});

/* ================= SAVE ================= */

function saveGlyph(){
fontData[currentChar]=strokes;
localStorage.setItem("airo_font",JSON.stringify(fontData));
}

/* ================= CLEAR ================= */

function clearGlyph(){
strokes=[];
saveGlyph();
drawGrid();
}

/* ================= CENTER RENDER ================= */

function centerGlyph(glyph){

let minX=Infinity,maxX=-Infinity;
let minY=Infinity,maxY=-Infinity;

glyph.forEach(stroke=>{
stroke.forEach(p=>{
minX=Math.min(minX,p[0]);
maxX=Math.max(maxX,p[0]);
minY=Math.min(minY,p[1]);
maxY=Math.max(maxY,p[1]);
});
});

let w=maxX-minX;
let h=maxY-minY;

let offsetX=(GRID_PIXELS-w)/2-minX;
let offsetY=(GRID_PIXELS-h)/2-minY;

return glyph.map(stroke=>
stroke.map(p=>[p[0]+offsetX,p[1]+offsetY])
);
}

/* ================= RENDER TEXT ================= */

function render(){

let ctx=writeCanvas.getContext("2d");
ctx.clearRect(0,0,writeCanvas.width,writeCanvas.height);

let x=10;
let y=40;
let max=writeCanvas.width-20;

let text=writerInput.value;

for(let i=0;i<text.length;i++){

let ch=text[i];

if(ch===" "){
x+=20;
continue;
}

let glyph=fontData[ch];

if(glyph){

let g=centerGlyph(glyph);

g.forEach(stroke=>{
ctx.beginPath();
ctx.moveTo(x+stroke[0][0]*0.15,y+stroke[0][1]*0.15);
for(let j=1;j<stroke.length;j++){
ctx.lineTo(x+stroke[j][0]*0.15,y+stroke[j][1]*0.15);
}
ctx.stroke();
});

x+=30;

}else{

ctx.fillStyle="white";
ctx.fillText(ch,x,y);
x+=ctx.measureText(ch).width+2;

}

if(x>max){
x=10;
y+=40;
}
}
}

/* ================= SETTINGS ================= */

function openSettings(){
settingsOverlay.style.display="flex";
rotateCode();
}

function closeSettings(){
settingsOverlay.style.display="none";
}

function enterDeveloper(){

let type=CODE_TYPES[codeIndex];

if(btoa(devCode.value)===ENCODED_CODES[type]){
developerPanel.style.display="block";
rotateCode();
}else{
alert("Wrong code");
}
}

function enterOverride(){

if(btoa(overrideCode.value)===ENCODED_OVERRIDE){
override=true;
alert("Override active");
}else alert("Wrong override");
}

/* ================= EXPORT ================= */

function exportFont(){

saveGlyph();

let payload={
sig:SYSTEM_SIGNATURE,
font:fontData
};

let blob=new Blob([btoa(JSON.stringify(payload))]);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="AIROGLIFPH.AIROGLIFPH";
a.click();

}

</script>
</body>
</html>
